# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1
          bundler-cache: true

      - name: Verify and Create Gemfile if Missing
        run: |
          if [ ! -f "Gemfile" ]; then
            echo 'source "https://rubygems.org"' > Gemfile
            echo 'gem "jekyll", "~> 4.4.1"' >> Gemfile
            echo 'gem "jekyll-remote-theme"' >> Gemfile
            echo 'gem "bundler"' >> Gemfile
          fi
          cat Gemfile # Debugging: Show contents of Gemfile

      - name: Install Bundler and Dependencies
        run: |
          gem install bundler
          bundle install --jobs 4 --retry 3
        env:
          BUNDLE_GEMFILE: Gemfile # Explicitly set Gemfile path

      - name: Build with Jekyll
        run: bundle exec jekyll build --destination ./_site

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-site
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: jekyll-site
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
